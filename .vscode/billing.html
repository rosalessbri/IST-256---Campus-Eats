<!DOCTYPE html>
<html lang="en" ng-app="billingApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing Details - Campus Eats</title>

 <link href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
 <link rel="stylesheet" href = "styles.css">
 <script src ="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

 </head>
 <body ng-controller = "BillingController">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class ="container-fluid">
            <a class="navbar-brand" href="index.html">Campus Eats</a>
        </div>
    </nav>
    <div class="container my-5">
        <h2 class="mb-4 text-center">Billing Details</h2>
        <div class ="row">

            <div class = "col-md-7">
                <div class = "card p-4 shadow-sm">
                    <form ng-submit = "submitBilling()">
                        <h5>Personal Info</h5>

                        <input type = "text" class ="form-control mb-3" placeholder="Full Name"
                        ng-model="billing.name" required>
                        <input type = "text" class ="form-control mb-3" placeholder="Address"
                        ng-model="billing.address" required>

                        <h5>Payment Info</h5>
                        <input type ="text" class ="form-control mb-3"
                        placeholder ="Card Number"
                        ng-model = "billing.card"
                        ng-pattern="/^[0-9]"
                        required>

                        <div class ="row">
                            <div class ="col">
                                <input type="text" class ="form-control mb-3"
                                placeholder = "MM/YY"
                                ng-model = "billing.exp"
                                ng-pattern="/^(0[1-9]|1[0-2])\/\d{2}$/"
                                required>

                            </div>
                            <div class ="col">
                                <input type="text" class="form-control mb-3"
                                placeholder="CVV"
                                ng-model="billing.cvv"
                                ng-pattern="/^[0-9]{3}$/"
                                required>
                            </div>
                        </div>
                        <button type ="submit" class="btn btn-success w-100">
                            Submit Payment
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script>       
    </script>
 </body>
