<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Eats - Manage Dining</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Campus Eats</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="signup.html">Submit Review</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Rankings</a></li>
          <li class="nav-item"><a class="nav-link" href="dining.html">Explore Dining</a></li>
          <li class="nav-item"><a class="nav-link active" href="manageDining.html">Manage Dining</a></li>
          <li class="nav-item"><a class="nav-link active" href="#">About</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h2 class="text-center mb-4">Manage Dining</h2>

    <form id="manageForm">
      <div class="mb-3">
        <label class="form-label">Restaurant ID *</label>
        <input type="text" class="form-control" id="restaurantId" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Restaurant Name *</label>
        <input type="text" class="form-control" id="restaurantName" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Dining Area *</label>
        <select class="form-select" id="diningArea" required>
          <option value="">Select Area</option>
          <option>Pollock</option>
          <option>South</option>
          <option>East</option>
          <option>North</option>
          <option>West</option>
          <option>HUB</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Restaurant Type *</label>
        <select class="form-select" id="restaurantType" required>
            <option value="">Select Type</option>
            <option>Fast Casual</option>
            <option>Cafe</option>
            <option>Buffet</option>
        </select>
    </div>

      <div class="mb-3">
        <label class="form-label">Average Rating *</label>
        <input type="number" class="form-control" id="avgRating" min="0" max="5" step="0.1" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Additional Notes (Optional)</label>
        <textarea class="form-control" id="notes"></textarea>
      </div>

      <button type="submit" class="btn btn-primary w-100">Add / Update Restaurant</button>
    </form>

    <hr>

    <div class="mb-3">
      <label class="form-label">Search Restaurant:</label>
      <input type="text" id="searchInput" class="form-control" placeholder="Search by name or area...">
    </div>

    <h3 class="mt-4">Restaurant Entries</h3>
    <div id="restaurantOutput"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="manageDining.js"></script>
</body>
</html>
