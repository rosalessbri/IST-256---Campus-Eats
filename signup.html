<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Eats - Submit Review</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Campus Eats 🍽️</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="campuseats.html">Submit Review</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Rankings</a></li>
          <li class="nav-item"><a class="nav-link" href="dining.html">Explore Dining</a></li>
          <li class="nav-item"><a class="nav-link" href="manageDining.html">Manage Dining</a></li>
          <li class="nav-item"><a class="nav-link" href="#">About</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h2 class="text-center mb-4">Submit Your Dining Review</h2>

    <form id="memberForm">
      <div class="mb-3">
        <label class="form-label">Student Name *</label>
        <input type="text" class="form-control" id="name" placeholder="Enter your name" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Email *</label>
        <input type="email" class="form-control" id="email" placeholder="Enter your PSU email" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Year *</label>
        <select class="form-select" id="year" required>
          <option value="">Select Year</option>
          <option>Freshman</option>
          <option>Sophomore</option>
          <option>Junior</option>
          <option>Senior</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Dorm / Residence *</label>
        <input type="text" class="form-control" id="dorm" placeholder="Enter your dorm" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Phone (Optional)</label>
        <input type="text" class="form-control" id="phone" placeholder="Enter phone number">
      </div>

      <div class="mb-3">
        <label class="form-label">Dining Location *</label>
        <select class="form-select" id="location" required>
          <option value="">Select Location</option>
          <option>Pollock</option>
          <option>South</option>
          <option>East</option>
          <option>North</option>
          <option>West</option>
          <option>Hub</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Restaurant *</label>
        <select class="form-select" id="restaurant" required>
          <option value="">Select Restaurant</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Rating (1-5) *</label>
        <input type="number" class="form-control" id="rating" min="1" max="5" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Comment</label>
        <textarea class="form-control" id="comment" rows="2" placeholder="Optional feedback"></textarea>
      </div>

      <button type="submit" class="btn btn-primary w-100">Submit Review</button>
    </form>

    
    <h3 class="mt-5">Submitted Reviews</h3>
    <div id="usersOutput"></div>
  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <script src="script.js"></script>
</body>
</html>
