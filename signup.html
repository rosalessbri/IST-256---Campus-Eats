<!DOCTYPE html>
<html>
<head>
    <title>Submit Dining Review</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Rate South & Pollock Dining 🍽️</h2>

    <div class="card mb-4 p-3 bg-light">
    <h5>How It Works:</h5>
    <ul class="mb-0">
        <li>Enter your information in the text boxes.</li>
        <li>Select the restaurant you want to rate.</li>
        <li>Click the stars to choose your rating.</li>
        <li>Leave a comment about your experience.</li>
        <li>See your review appear instantly below!</li>
    </ul>
</div>

    <form id="ratingForm">

        <!-- ENTER INFO -->
        <div class="mb-3">
            <label class="form-label">Your Name *</label>
            <input type="text" class="form-control" id="name" placeholder="Enter your name">
        </div>

        <div class="mb-3">
            <label class="form-label">Email *</label>
            <input type="email" class="form-control" id="email" placeholder="Enter your email">
        </div>

        <div class="mb-3">
            <label class="form-label">Year *</label>
            <select class="form-select" id="year">
                <option value="">Select Year</option>
                <option>Freshman</option>
                <option>Sophomore</option>
                <option>Junior</option>
                <option>Senior</option>
            </select>
        </div>

        <!-- SELECT RESTAURANT -->
        <div class="mb-3">
            <label class="form-label">Restaurant *</label>
            <select class="form-select" id="restaurant">
                <option value="">Select Restaurant</option>
                <option>Fresco</option>
                <option>Asia Kitchen</option>
                <option>Choolaah Indian BBQ</option>
                <option>Redifer City Grill</option>
                <option>Southside Buffet</option>
                <option>Pollock Buffet</option>
                <option>Amici Italian Market</option>
                <option>Bowls</option>
                <option>On a Roll</option>
            </select>
        </div>

        <!-- STAR RATING -->
        <div class="mb-3">
            <label class="form-label">Rating *</label>
            <div class="stars" id="stars">
                <span data-value="1">☆</span>
                <span data-value="2">☆</span>
                <span data-value="3">☆</span>
                <span data-value="4">☆</span>
                <span data-value="5">☆</span>
            </div>
        </div>

        <!-- COMMENT -->
        <div class="mb-3">
            <label class="form-label">Comment</label>
            <textarea class="form-control" id="comment" rows="3" placeholder="Write your experience..."></textarea>
        </div>

        <button type="submit" class="btn btn-success w-100">Submit Review</button>
    </form>

    <hr>

    <h3 class="mt-4">Submitted Reviews</h3>
    <div id="output"></div>
</div>

<script src="script.js"></script>

</body>
</html>
